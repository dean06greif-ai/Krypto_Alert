services:
  # Backend Service (FastAPI + WebSocket)
  - type: web
    name: crypto-scanner-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: crypto_scanner
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: BITUNIX_API_KEY
        sync: false
      - key: BITUNIX_SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Service (React Static Site)
  - type: web
    name: crypto-scanner-frontend
    runtime: static
    buildCommand: cd frontend && yarn install && yarn build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
